<html>

<head>
    <title>Application Form</title>

    <style>

        body{
            font-family:Arial;
            background-color:#F5F9FF;
        }

        .container{
            width:60%;
            margin:auto;
            border:2px solid navy;
            padding:20px;
            border-radius:10px;
            background-color:white;
        }

        h1{
            text-align:center;
            color:red;
        }

        h3{
            text-align:center;
            text-decoration:underline;
            color:darkblue;
        }

        table{
            width:100%;
        }

        td{
            padding:10px;
        }

        input, textarea, select{
            padding:5px;
        }

        .btn{
            padding:8px 20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>APPLICATION FORM</h1>

<h3>PERSONAL DETAILS</h3>

<form>

<table>

<tr>
<td>First Name</td>
<td><input type="text"></td>

<td>Last Name</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Date of Birth</td>
<td><input type="date"></td>

<td>Email</td>
<td><input type="email"></td>
</tr>

<tr>
<td>Contact Number</td>
<td><input type="tel"></td>

<td>OTP</td>
<td><input type="password"></td>
</tr>

<tr>
<td>Address</td>
<td colspan="3">
<textarea rows="4" cols="40"></textarea>
</td>
</tr>

<tr>
<td>City</td>
<td><input type="text"></td>

<td>Pincode</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Gender</td>
<td colspan="3">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
</td>
</tr>

<tr>
<td>Programming Languages</td>
<td colspan="3">
<input type="checkbox"> Python
<input type="checkbox"> Java
<input type="checkbox"> JavaScript
<input type="checkbox"> C#
<input type="checkbox"> Kotlin
<input type="checkbox"> Ruby
</td>
</tr>

<tr>
<td>Position Applying For</td>
<td colspan="3">
<select>
<option>Project Manager</option>
<option>Software Engineer</option>
<option>Web Developer</option>
<option>Tester</option>
</select>
</td>
</tr>

<tr>
<td>Educational Qualification</td>
<td colspan="3">
<input type="radio" name="edu"> B.E
<input type="radio" name="edu"> B.Tech
<input type="radio" name="edu"> B.Sc
<input type="radio" name="edu"> M.Sc
<input type="radio" name="edu"> MCA
<input type="radio" name="edu"> M.E
</td>
</tr>

<tr>
<td>Upload Resume</td>
<td colspan="3">
<input type="file">
</td>
</tr>

<tr>
<td colspan="4" align="center">
<input class="btn" type="submit" value="Submit">
&nbsp;&nbsp;
<input class="btn" type="reset" value="Reset">
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
